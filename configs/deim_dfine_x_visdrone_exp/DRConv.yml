__include__: [
  '../deim_dfine/deim_hgnetv2_x_visdrone.yml',
  '../base/deim.yml'
]

print_freq: 850
checkpoint_freq: 45
output_dir: ./deim_dfine_x_visdrone_exps/DRConv_mlca_waveupdown_cgfm_lr0003back0003epo112

DEIM:
  backbone: HGNetv2_DilatedReparamConv
  encoder: HybridEncoder_CGFM
  decoder: DFINETransformer

HGNetv2_DilatedReparamConv:
  name: 'B5'
  return_idx: [1, 2, 3]
  freeze_stem_only: False
  freeze_at: -1
  freeze_norm: True
  use_lab: True
  pretrained: False
  agg: MLCA

HybridEncoder_CGFM:
  in_channels: [512, 1024, 2048]
  feat_strides: [8, 16, 32]
    # intra
  hidden_dim: 384
  use_encoder_idx: [2]
  dim_feedforward: 2048
  num_encoder_layers: 1
  nhead: 8
  dropout: 0.
  enc_act: gelu
  act: silu
  # cross
  expansion: 1.0
  depth_mult: 1

optimizer:
  type: AdamW
  params:
    -
      params: '^(?=.*backbone)(?!.*norm|bn).*$'
      lr: 0.0003
    # -
    #   params: '^(?=.*backbone)(?=.*norm|bn).*$'
    #   lr: 0.00025
    #   weight_decay: 0.
    -
      params: '^(?=.*(?:encoder|decoder))(?=.*(?:norm|bn)).*$'
      weight_decay: 0.

  lr: 0.0003
  betas: [0.9, 0.999]
  weight_decay: 0.000125

# Increase to search for the optimal ema
epoches: 112 # 120 + 4n

## Our LR-Scheduler
flat_epoch: 112   # 4 + epoch // 2, e.g., 40 = 4 + 72 / 2
no_aug_epoch: 8

## Our DataAug
train_dataloader: 
  dataset: 
    transforms:
      policy:
        epoch: [4, 56, 104]   # list 
  total_batch_size: 4
  collate_fn:
    mixup_epochs: [4, 56]
    stop_epoch: 104
  num_workers: 8
  pin_memory: True

val_dataloader:
  total_batch_size: 1
  num_workers: 8
  pin_memory: True

