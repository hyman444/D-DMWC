__include__: [
  '../deim_dfine/deim_hgnetv2_n_voc12.yml',
  '../base/deim.yml'
]

print_freq: 500
checkpoint_freq: 20
output_dir: ./deim_dfine_n_voc12_exps/drconv_mlca_waveupdown_cgfm_ker

DEIM:
  backbone: HGNetv2_DilatedReparamConv
  encoder: HybridEncoder_CGFM
  decoder: DFINETransformer

HGNetv2_DilatedReparamConv:
  name: 'B0'
  return_idx: [2, 3]
  freeze_at: -1
  freeze_norm: False
  use_lab: True
  pretrained: False
  agg: MLCA

HybridEncoder_CGFM:
  in_channels: [512, 1024]
  feat_strides: [16, 32]

  # intra
  hidden_dim: 128
  use_encoder_idx: [1]
  num_encoder_layers: 1
  nhead: 8
  dim_feedforward: 512
  dropout: 0.
  enc_act: 'gelu'

  # cross
  expansion: 0.34
  depth_mult: 0.5
  act: 'silu'


optimizer:
  type: AdamW
  params:
    -
      params: '^(?=.*backbone)(?!.*norm|bn).*$'
      lr: 0.0004
    -
      params: '^(?=.*backbone)(?=.*norm|bn).*$'
      lr: 0.0004
      weight_decay: 0.
    -
      params: '^(?=.*(?:encoder|decoder))(?=.*(?:norm|bn|bias)).*$'
      weight_decay: 0.

  lr: 0.0008
  betas: [0.9, 0.999]
  weight_decay: 0.0001

# Increase to search for the optimal ema
epoches: 160 # 148 + 12

## Our LR-Scheduler
flat_epoch: 78    # 4 + epoch // 2, e.g., 40 = 4 + 72 / 2
no_aug_epoch: 12
lr_gamma: 1.0

## Our DataAug
train_dataloader: 
  dataset: 
    transforms:
      policy:
        epoch: [4, 78, 148]   # list 
  total_batch_size: 16
  num_workers: 8

  collate_fn:
    mixup_epochs: [4, 78]
    stop_epoch: 148
    base_size_repeat: ~

val_dataloader:
  total_batch_size: 32
  num_workers: 8
