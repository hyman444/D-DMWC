__include__: [
  './dfine_hgnetv2_x_visdrone.yml',
  '../base/deim.yml'
]

output_dir: ./deim_dfine_x_visdrone_exps/baseline_lr0003back0003epo112
print_freq: 850
checkpoint_freq: 50

HGNetv2:
  name: 'B5'
  return_idx: [1, 2, 3]
  freeze_stem_only: False
  freeze_at: -1
  freeze_norm: True
  use_lab: True
  pretrained: False
  agg: se

optimizer:
  type: AdamW
  params:
    -
      params: '^(?=.*backbone)(?!.*norm|bn).*$'
      lr: 0.0003
    # -
    #   params: '^(?=.*backbone)(?=.*norm|bn).*$'
    #   lr: 0.00025
    #   weight_decay: 0.
    -
      params: '^(?=.*(?:encoder|decoder))(?=.*(?:norm|bn)).*$'
      weight_decay: 0.

  lr: 0.0003
  betas: [0.9, 0.999]
  weight_decay: 0.000125

# Increase to search for the optimal ema
epoches: 128 # 120 + 4n

## Our LR-Scheduler
flat_epoch: 116    # 4 + epoch // 2, e.g., 40 = 4 + 72 / 2
no_aug_epoch: 8

## Our DataAug
train_dataloader: 
  dataset: 
    transforms:
      policy:
        epoch: [4, 56, 120]   # list 
  total_batch_size: 4
  collate_fn:
    mixup_epochs: [4, 56]
    stop_epoch: 120
  num_workers: 8
  pin_memory: True

val_dataloader:
  total_batch_size: 1
  num_workers: 8
  pin_memory: True