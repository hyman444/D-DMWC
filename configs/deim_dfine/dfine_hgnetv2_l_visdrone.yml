__include__: [
  '../dataset/visdrone_detection.yml',
  '../runtime.yml',
  '../base/dataloader_dfine.yml',
  '../base/optimizer.yml',
  '../base/dfine_hgnetv2.yml',
]

print_freq: 850
checkpoint_freq: 40
output_dir: deim_dfine_l_visdrone_exps/dfine_lr00025back000125epoch102

HGNetv2:
  name: 'B4'
  return_idx: [1, 2, 3]
  freeze_stem_only: False
  freeze_at: -1
  freeze_norm: True
  pretrained: False
  use_lab: True
  agg: se

optimizer:
  type: AdamW
  params:
    -
      params: '^(?=.*backbone)(?!.*norm|bn).*$'
      lr: 0.000125
    -
      params: '^(?=.*(?:encoder|decoder))(?=.*(?:norm|bn)).*$'
      weight_decay: 0.

  lr: 0.00025
  betas: [0.9, 0.999]
  weight_decay: 0.000125


# Increase to search for the optimal ema
epoches: 102 # 72 + 2n
train_dataloader:
  dataset:
    transforms:
      policy:
        epoch: 92
  collate_fn:
    stop_epoch: 92
    ema_restart_decay: 0.9999
    base_size_repeat: 4
  total_batch_size: 4
  num_workers: 8

val_dataloader:
  total_batch_size: 1
  num_workers: 8
