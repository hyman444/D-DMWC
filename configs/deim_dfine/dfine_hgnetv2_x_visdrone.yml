__include__: [
  '../dataset/visdrone_detection.yml',
  '../runtime.yml',
  '../base/dataloader_dfine.yml',
  '../base/optimizer.yml',
  '../base/dfine_hgnetv2.yml',
]

output_dir: ./deim_dfine_x_visdrone_exps/dfine_lr0003back0003
print_freq: 850
checkpoint_freq: 50

DEIM:
  backbone: HGNetv2

HGNetv2:
  name: 'B5'
  return_idx: [1, 2, 3]
  freeze_stem_only: False
  freeze_at: -1
  freeze_norm: True
  use_lab: True
  pretrained: False
  agg: se

HybridEncoder:
  # intra
  hidden_dim: 384
  dim_feedforward: 2048

DFINETransformer:
  feat_channels: [384, 384, 384]
  reg_scale: 8

optimizer:
  type: AdamW
  params:
    -
      params: '^(?=.*backbone)(?!.*norm|bn).*$'
      lr: 0.0003
    -
      params: '^(?=.*(?:encoder|decoder))(?=.*(?:norm|bn)).*$'
      weight_decay: 0.

  lr: 0.0003
  betas: [0.9, 0.999]
  weight_decay: 0.000125

# Increase to search for the optimal ema
epoches: 112 # 120 + 4n
train_dataloader:
  dataset:
    transforms:
      policy:
        epoch: 100
  collate_fn:
    stop_epoch: 100
    ema_restart_decay: 0.9998
    base_size_repeat: 3
  total_batch_size: 4
  num_workers: 8

val_dataloader:
  total_batch_size: 8
  num_workers: 8