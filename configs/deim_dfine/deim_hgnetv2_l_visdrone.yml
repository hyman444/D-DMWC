__include__: [
  './dfine_hgnetv2_l_visdrone.yml',
  '../base/deim.yml'
]

print_freq: 850
checkpoint_freq: 50
output_dir: deim_dfine_l_visdrone_exps/baseline_se

optimizer:
  type: AdamW
  params: 
    - 
      params: '^(?=.*backbone)(?!.*norm|bn).*$'
      lr: 0.000025
    - 
      params: '^(?=.*(?:encoder|decoder))(?=.*(?:norm|bn)).*$'
      weight_decay: 0.

  lr: 0.0005
  betas: [0.9, 0.999]
  weight_decay: 0.000125
  
# Increase to search for the optimal ema
epoches: 58 # 72 + 2n

## Our LR-Scheduler
flat_epoch: 29    # 4 + epoch // 2, e.g., 40 = 4 + 72 / 2
no_aug_epoch: 8

train_dataloader: 
  dataset: 
    transforms:
      policy:
        epoch: [4, 29, 50]   # list 

  collate_fn:
    mixup_epochs: [4, 29]
    stop_epoch: 50
  total_batch_size: 4
  num_workers: 8
  
val_dataloader:
  total_batch_size: 8
  num_workers: 8