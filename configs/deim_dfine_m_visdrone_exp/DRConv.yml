__include__: [
  '../deim_dfine/deim_hgnetv2_m_visdrone.yml',
  '../base/deim.yml'
]

print_freq: 1000
checkpoint_freq: 12
output_dir: deim_dfine_m_visdrone_exps/drconv_mlca_waveupdown_cgfm_test

DEIM:
  backbone: HGNetv2_DilatedReparamConv
  encoder: HybridEncoder_CGFM
  decoder: DFINETransformer

HGNetv2_DilatedReparamConv:
  name: 'B2'
  return_idx: [1, 2, 3]
  freeze_at: -1
  freeze_norm: False
  use_lab: True
  pretrained: False
  agg: MLCA

HybridEncoder_CGFM:
  in_channels: [384, 768, 1536]
  feat_strides: [8, 16, 32]

  # intra
  hidden_dim: 256
  use_encoder_idx: [2]
  num_encoder_layers: 1
  nhead: 8
  dim_feedforward: 1024
  dropout: 0.
  enc_act: 'gelu'

  # cross
  expansion: 1
  depth_mult: 0.67
  act: 'silu'

optimizer:
  type: AdamW
  params:
    -
      params: '^(?=.*backbone)(?!.*norm|bn).*$'
      lr: 0.00004
    -
      params: '^(?=.*backbone)(?=.*norm|bn).*$'
      lr: 0.00002
      weight_decay: 0.
    -
      params: '^(?=.*(?:encoder|decoder))(?=.*(?:norm|bn|bias)).*$'
      weight_decay: 0.

  lr: 0.0004
  betas: [0.9, 0.999]
  weight_decay: 0.0001
  
## Our DataAug
train_dataloader: 
  dataset: 
    transforms:
      policy:
        epoch: [4, 49, 90]   # list 

  collate_fn:
    mixup_epochs: [4, 49]
    stop_epoch: 90
  total_batch_size: 4
  num_workers: 8
  
val_dataloader:
  total_batch_size: 8
  num_workers: 8
